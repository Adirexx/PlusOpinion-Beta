<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlusOpinion — Redirecting</title>
    <!--
        onboarding.html — LEGACY REDIRECT STUB
        The onboarding flow (signup → OTP → profile setup) is now fully
        integrated into index.html as overlay steps.
        Anyone who lands here (old link, cached bookmark, direct URL) is
        instantly sent to index.html which handles all auth states.
    -->
    <script>
        // Preserve any query string that was passed (e.g. ?step=profile)
        var dest = '/index.html' + window.location.search + window.location.hash;
        window.location.replace(dest);
    </script>
    <meta http-equiv="refresh" content="0; url=/index.html">
    <style>
        body {
            background: #020205;
            color: rgba(255, 255, 255, 0.5);
            font-family: system-ui, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        p {
            font-size: 14px;
        }
    </style>
</head>

<body>
    <p>Redirecting...</p>
</body>

</html>
